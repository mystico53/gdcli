name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Determine the version tag to use
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      should_release: ${{ steps.tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Triggered by a manual tag push — use it directly
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            # Triggered by push to main or workflow_dispatch — auto-increment patch
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              TAG="v0.1.0"
            else
              # Increment patch version
              MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
              PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
              PATCH=$((PATCH + 1))
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
            fi

            # Skip if HEAD is already tagged (avoid duplicate releases)
            HEAD_TAGS=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
            if [ -n "$HEAD_TAGS" ]; then
              echo "HEAD already has a version tag ($HEAD_TAGS), skipping release"
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Resolved tag: $(cat "$GITHUB_OUTPUT")"

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdcli-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/gdcli
            target/${{ matrix.target }}/release/gdcli.exe

  universal-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: gdcli-x86_64-apple-darwin
          path: x86_64

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: gdcli-aarch64-apple-darwin
          path: aarch64

      - name: Create universal binary
        run: |
          chmod +x x86_64/gdcli aarch64/gdcli
          lipo -create x86_64/gdcli aarch64/gdcli -output gdcli
          chmod +x gdcli

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdcli-macos-universal
          path: gdcli

  release:
    needs: [resolve-version, build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: gdcli-x86_64-pc-windows-msvc
          path: windows

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: gdcli-x86_64-unknown-linux-musl
          path: linux

      - name: Download macOS universal binary
        uses: actions/download-artifact@v4
        with:
          name: gdcli-macos-universal
          path: macos

      - name: Package archives
        run: |
          cd windows && zip ../gdcli-windows-x86_64.zip gdcli.exe && cd ..
          cd linux && chmod +x gdcli && tar czf ../gdcli-linux-x86_64.tar.gz gdcli && cd ..
          cd macos && chmod +x gdcli && tar czf ../gdcli-macos-universal.tar.gz gdcli && cd ..

      - name: Create tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          generate_release_notes: true
          files: |
            gdcli-windows-x86_64.zip
            gdcli-linux-x86_64.tar.gz
            gdcli-macos-universal.tar.gz

  publish-npm:
    needs: [resolve-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set npm package version from tag
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          VERSION="${TAG#v}"
          cd npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Copy README into npm package
        run: cp README.md npm/README.md

      - name: Publish to npm
        run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
